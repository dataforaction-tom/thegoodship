<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="g1" cx="20%" cy="80%" r="55%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#2D8B7A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1B2A4A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="80%" cy="20%" r="55%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#D4993D" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#1B2A4A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#1B2A4A"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="#2D8B7A"/>

  <!-- Envelope icon -->
  <g transform="translate(540, 80)" stroke="#2D8B7A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <rect x="0" y="0" width="120" height="82" rx="5" opacity="0.25" fill="#2D8B7A"/>
    <rect x="0" y="0" width="120" height="82" rx="5"/>
    <path d="M0 4l60 42 60-42"/>
    <line x1="28" y1="58" x2="66" y2="58" opacity="0.45"/>
    <line x1="28" y1="68" x2="58" y2="68" opacity="0.3"/>
  </g>

  <!-- Eyebrow label -->
  <text x="600" y="218" font-family="Georgia, serif" font-size="17" fill="#8BA4B8" text-anchor="middle" letter-spacing="2" font-style="italic">a small experiment · june 2026</text>

  <!-- Main title -->
  <text x="600" y="308" font-family="Georgia, 'Times New Roman', serif" font-size="84" font-weight="700" fill="#F5F0E8" text-anchor="middle" letter-spacing="-1">The Slow Post</text>

  <!-- Tagline -->
  <text x="600" y="370" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" fill="rgba(245,240,232,0.68)" text-anchor="middle">Switch off. Go outside. Write something by hand. Post it.</text>

  <!-- Divider -->
  <line x1="480" y1="404" x2="720" y2="404" stroke="rgba(45,139,122,0.35)" stroke-width="1"/>

  <!-- Date line 1 -->
  <text x="600" y="444" font-family="'Courier New', Courier, monospace" font-size="20" fill="#D4993D" text-anchor="middle" letter-spacing="0.5">Wednesday 10 June 2026</text>

  <!-- Date line 2 -->
  <text x="600" y="472" font-family="'Courier New', Courier, monospace" font-size="16" fill="rgba(212,153,61,0.7)" text-anchor="middle" letter-spacing="1">Great Big Green Week</text>

  <!-- Bottom branding -->
  <text x="600" y="570" font-family="Georgia, serif" font-size="18" fill="rgba(245,240,232,0.35)" text-anchor="middle">The Good Ship · good-ship.co.uk</text>
</svg>
